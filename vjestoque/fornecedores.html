<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fornecedores</title>

    <link rel="stylesheet" href="css/fornecedores.css">

</head>

<body>

    <div class="container">

        <div class="topo">

            <h1>Fornecedores</h1>

            <div class="botoes">

                <button class="novo" onclick="abrirModal()">

                    Cadastrar Fornecedor

                </button>

                <button class="voltar" onclick="voltar()">

                    Voltar

                </button>

            </div>

        </div>

        <div class="tabela">

            <table>

                <thead>

                    <tr>

                        <th>Fornecedor</th>

                        <th>Produto</th>

                        <th>Telefone</th>

                        <th>Ações</th>

                    </tr>

                </thead>

                <tbody id="listaFornecedores">

                    <tr>

                        <td>Distribuidora Norte</td>

                        <td>Bebidas</td>

                        <td>(17) 99999-1111</td>

                        <td>

                            <button class="excluir" onclick="excluirFornecedor(this)">

                                Excluir

                            </button>

                        </td>

                    </tr>

                    <tr>

                        <td>Frutas Silva</td>

                        <td>Frutas</td>

                        <td>(17) 98888-2222</td>

                        <td>

                            <button class="excluir" onclick="excluirFornecedor(this)">

                                Excluir

                            </button>

                        </td>

                    </tr>

                    <tr>

                        <td>Grãos Brasil</td>

                        <td>Grãos</td>

                        <td>(17) 97777-3333</td>

                        <td>

                            <button class="excluir" onclick="excluirFornecedor(this)">

                                Excluir

                            </button>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

    <div class="modal" id="modal">

        <div class="modal-conteudo">

            <h2>Novo Fornecedor</h2>

            <input type="text" id="nome" placeholder="Nome do fornecedor">

            <select id="produto">

                <option value="">
                    Produto vendido
                </option>

                <option>
                    Frutas
                </option>

                <option>
                    Bebidas
                </option>

                <option>
                    Grãos
                </option>

            </select>

            <input type="text" id="telefone" placeholder="Telefone">

            <button onclick="cadastrarFornecedor()">

                Salvar

            </button>
            <button class="fechar" onclick="fecharModal()">
                Cancelar
            </button>
        </div>
    </div>
    <script src="js/fornecedores.js"></script>
</body>
</html>
